<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Drizzle CSS</title>
  <link rel="stylesheet" href="../dist/drizzle.css">
</head>
<body>

  <nav><a href="index.html">← Home</a></nav>
  <hr>

  <main class="narrow">
    <article class="card">
      <h1>Sign in</h1>
      <p class="muted">Welcome back. Enter your details to continue.</p>

      <form>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>

        <label><input type="checkbox" name="remember"> Remember me</label>

        <p class="stack">
          <button type="submit">Sign in</button>
        </p>
      </form>

      <p class="center muted"><a href="#">Forgot your password?</a></p>
    </article>

    <p class="center">No account? <a href="register.html">Create one</a></p>
  </main>

</body>
</html>
